<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotGoogle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #202124; /* Google Dark Mode Background */
            color: #e8eaed; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Ikon Setting di pojok kanan atas */
        .settings-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            color: #e8eaed;
            text-decoration: none;
        }

        .settings-icon:hover {
            background-color: #303134; /* Efek hover bundar ala Google */
        }

        .settings-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Area utama fokus search engine */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 584px;
            padding: 0 20px;
        }

        .logo {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 30px;
            user-select: none;
            letter-spacing: -1px;
            text-align: center;
        }

        /* Tone warna logo NotGoogle Dark Mode */
        .g1 { color: #8ab4f8; } 
        .o1 { color: #f28b82; } 
        .o2 { color: #fdd663; } 
        .g2 { color: #8ab4f8; } 
        .l  { color: #81c995; } 
        .e  { color: #f28b82; }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-box {
            display: flex;
            width: 100%;
            border: 1px solid #5f6368;
            padding: 12px 18px;
            border-radius: 24px;
            background: #202124;
            margin-bottom: 25px;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .search-box:hover, .search-box:focus-within {
            background-color: #303134;
            box-shadow: 0 1px 6px rgba(0,0,0,0.4);
            border-color: transparent;
        }

        .search-box input[type="text"] {
            flex-grow: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            color: #e8eaed;
        }

        .buttons input[type="submit"] {
            background-color: #303134;
            border: 1px solid #303134;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            padding: 0 24px;
            height: 40px;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .buttons input[type="submit"]:hover {
            background-color: #3c4043;
            border: 1px solid #5f6368;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Tombol Setting Pojok Kanan Atas -->
    <!-- Catatan: Diarahkan ke Google Preferences karena Chrome memblokir link internal chrome:// -->
    <a href="https://www.google.com/preferences" target="_blank" class="settings-icon" title="Setelan">
        <svg viewBox="0 0 24 24">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.03,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
    </a>

    <main>
        <div class="logo">
            <span class="g1">N</span><span class="o1">o</span><span class="o2">t</span><span class="g2">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
        </div>

        <form action="https://www.google.com/search" method="GET">
            <div class="search-box">
                <input type="text" name="q" autofocus required autocomplete="off">
            </div>
            <div class="buttons">
                <input type="submit" value="Cari di NotGoogle">
            </div>
        </form>
    </main>

</body>
</html>
